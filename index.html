<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deesay System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .tagline {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px 28px;
      width: 200px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    .card:hover {
      border-color: #6366f1;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.2);
    }

    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      margin-top: 12px;
    }

    .badge-lock {
      background: #1e3a5f;
      color: #60a5fa;
    }

    .badge-open {
      background: #14532d;
      color: #4ade80;
    }
  </style>
</head>
<body>

  <div class="logo">DEESAY</div>
  <div class="tagline">Internal Business System</div>

  <div class="cards">

    <a href="dashboard.html" class="card">
      <div class="card-icon">📊</div>
      <div class="card-title">Dashboard</div>
      <div class="card-desc">ดูรายงานยอดขายทุกช่องทาง</div>
      <span class="badge badge-open">เปิดสาธารณะ</span>
    </a>

    <a href="upload.html" class="card">
      <div class="card-icon">📤</div>
      <div class="card-title">Upload</div>
      <div class="card-desc">อัพโหลดข้อมูลยอดขายและ settlement</div>
      <span class="badge badge-lock">🔒 ต้อง Login</span>
    </a>

    <a href="admin.html" class="card">
      <div class="card-icon">⚙️</div>
      <div class="card-title">Admin</div>
      <div class="card-desc">จัดการ master data และ KPI</div>
      <span class="badge badge-lock">🔒 ต้อง Login</span>
    </a>

  </div>

</body>
</html>
