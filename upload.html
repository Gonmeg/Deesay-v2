<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload | Deesay</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #f0f4ff; --muted: #6b7a99; --accent: #6366f1; --accent2: #818cf8;
      --success: #10b981; --danger: #ef4444; --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav { border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 52px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .nav-logo { font-size: 0.8rem; font-weight: 700; letter-spacing: 3px; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-link { font-size: 0.8rem; color: var(--muted); text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    .btn-ghost { font-size: 0.8rem; color: var(--muted); background: none; border: 1px solid var(--border2); padding: 4px 12px; border-radius: 6px; cursor: pointer; }
    .btn-ghost:hover { color: var(--text); }

    /* LAYOUT */
    main { display: flex; justify-content: center; padding: 36px 24px; }
    .shell { width: 100%; max-width: 720px; }

    /* HEADER */
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
    .page-header p { font-size: 0.82rem; color: var(--muted); }

    /* STEPS */
    .step-track { display: flex; align-items: center; margin-bottom: 24px; }
    .step-item { display: flex; align-items: center; gap: 8px; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; border: 1.5px solid var(--border2); color: var(--muted); flex-shrink: 0; transition: all 0.2s; }
    .step-num.active { background: var(--accent); border-color: var(--accent); color: white; }
    .step-num.done { background: var(--success); border-color: var(--success); color: white; }
    .step-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .step-label.active { color: var(--text); }
    .step-line { flex: 1; height: 1px; background: var(--border2); margin: 0 10px; }
    .step-line.done { background: var(--success); }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }

    /* STEP 1 */
    .step1-grid { display: grid; grid-template-columns: 200px 1fr; gap: 16px; align-items: start; margin-bottom: 20px; }
    .field-label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .req { color: var(--danger); }
    select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); padding: 9px 12px; font-size: 0.85rem; font-family: inherit; outline: none; cursor: pointer; }
    select:focus { border-color: var(--accent); }
    select option { background: #1a2235; }
    #fileInput { display: none; }
    .drop-label { display: block; border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .drop-label:hover { border-color: var(--accent); background: rgba(99,102,241,0.04); }
    .drop-label.has-file { border-color: var(--success); background: rgba(16,185,129,0.04); }
    .drop-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .drop-main { font-size: 0.82rem; color: var(--muted); }
    .drop-main strong { color: var(--text); }
    .drop-sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    /* STEP 2 — compact 2-col grid */
    .map-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .map-item { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: center; background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; }
    .map-field-name { font-size: 0.8rem; font-weight: 500; color: var(--text); }
    .map-field-req { color: var(--danger); font-size: 0.7rem; }
    .badge { display: inline-flex; font-size: 0.65rem; padding: 1px 6px; border-radius: 99px; margin-left: 4px; vertical-align: middle; }
    .badge-auto { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-manual { background: rgba(251,146,60,0.15); color: #fb923c; }
    .map-select { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 6px 8px; font-size: 0.78rem; font-family: inherit; outline: none; }
    .map-select:focus { border-color: var(--accent); }
    .map-select.matched { border-color: rgba(16,185,129,0.35); }
    .map-select option { background: #0a0f1e; }

    /* STEP 3 */
    .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .stat-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
    .stat-num { font-size: 1.4rem; font-weight: 600; color: var(--accent2); }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .preview-wrap { overflow-x: auto; margin-bottom: 4px; }
    .preview-tbl { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .preview-tbl th { background: var(--surface2); padding: 7px 10px; text-align: left; color: var(--muted); font-weight: 500; white-space: nowrap; }
    .preview-tbl td { padding: 7px 10px; border-top: 1px solid var(--border); white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    .preview-tbl tr:hover td { background: var(--surface2); }
    .progress-track { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; margin-top: 16px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

    /* BUTTONS */
    .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 20px; }
    .btn-primary { display: inline-flex; align-items: center; padding: 9px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }
    .btn-back { display: inline-flex; align-items: center; padding: 9px 16px; background: none; color: var(--muted); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .btn-back:hover { color: var(--text); border-color: var(--muted); }

    /* ALERT */
    .alert { border-radius: var(--radius-sm); padding: 10px 14px; font-size: 0.82rem; margin-top: 12px; }
    .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    .step-panel { display: none; }
    .step-panel.active { display: block; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">DEESAY</div>
  <div class="nav-right">
    <a href="index.html" class="nav-link">← หน้าแรก</a>
    <button class="btn-ghost" id="logoutBtn">ออกจากระบบ</button>
  </div>
</nav>

<main>
<div class="shell">

  <div class="page-header">
    <h1>Upload ข้อมูลยอดขาย</h1>
    <p>นำเข้าไฟล์รายงานจากแต่ละช่องทาง ระบบจะจับคู่คอลัมน์และบันทึกเข้าฐานข้อมูลให้อัตโนมัติ</p>
  </div>

  <div class="step-track">
    <div class="step-item">
      <div class="step-num active" id="snum1">1</div>
      <div class="step-label active" id="slabel1">เลือกไฟล์</div>
    </div>
    <div class="step-line" id="sline1"></div>
    <div class="step-item">
      <div class="step-num" id="snum2">2</div>
      <div class="step-label" id="slabel2">จับคู่คอลัมน์</div>
    </div>
    <div class="step-line" id="sline2"></div>
    <div class="step-item">
      <div class="step-num" id="snum3">3</div>
      <div class="step-label" id="slabel3">ยืนยัน</div>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="step-panel active" id="panel1">
    <div class="card">
      <div class="section-title">เลือก Channel และไฟล์</div>
      <div class="step1-grid">
        <div>
          <label class="field-label">Channel <span class="req">*</span></label>
          <select id="channelSelect">
            <option value="">— เลือก —</option>
            <option value="Facebook">Facebook</option>
            <option value="TikTok">TikTok</option>
            <option value="Shopee">Shopee</option>
            <option value="Lazada">Lazada</option>
            <option value="ตัวแทน">ตัวแทน</option>
            <option value="Modern Trade">Modern Trade</option>
          </select>
        </div>
        <div>
          <label class="field-label">ไฟล์ Excel หรือ CSV <span class="req">*</span></label>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
          <label class="drop-label" id="dropLabel" for="fileInput">
            <span class="drop-icon" id="dropIcon">📂</span>
            <div class="drop-main" id="dropMain"><strong>คลิกเพื่อเลือกไฟล์</strong> หรือลากมาวาง</div>
            <div class="drop-sub" id="dropSub">.xlsx .xls .csv</div>
          </label>
        </div>
      </div>
      <div id="alert1" class="alert alert-error" style="display:none"></div>
      <div class="btn-row">
        <button class="btn-primary" id="btnStep1">ถัดไป →</button>
      </div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="step-panel" id="panel2">
    <div class="card">
      <div class="section-title">จับคู่คอลัมน์</div>
      <p class="map-info">ระบบ auto-match คอลัมน์ให้แล้ว ตรวจสอบและแก้ไขถ้าไม่ถูกต้อง</p>
      <div class="map-grid" id="mappingRows"></div>
      <div id="alert2" class="alert alert-error" style="display:none"></div>
      <div class="btn-row">
        <button class="btn-back" id="btnBack2">← ย้อนกลับ</button>
        <button class="btn-primary" id="btnStep2">Preview →</button>
      </div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="step-panel" id="panel3">
    <div class="card">
      <div class="section-title">ตรวจสอบก่อน Upload</div>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="preview-wrap"><table class="preview-tbl" id="previewTbl"></table></div>
      <div class="progress-track" id="progressTrack" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div id="alert3" class="alert" style="display:none"></div>
      <div class="btn-row">
        <button class="btn-back" id="btnBack3">← ย้อนกลับ</button>
        <button class="btn-primary" id="btnConfirm">✓ ยืนยัน Upload</button>
      </div>
    </div>
  </div>

</div>
</main>

<script src="config.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

if (sessionStorage.getItem('auth') !== 'true') {
  window.location.href = 'login.html?redirect=upload.html'
}

const DB = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)

const FIELDS = [
  { key:'order_id',       label:'Order ID',        required:true,  keywords:['เลขที่คำสั่งซื้อ','order id','orderid','order_id'] },
  { key:'date',           label:'วันที่สั่งซื้อ',   required:true,  keywords:['วันที่สั่งซื้อ','วันที่','date'] },
  { key:'sub_channel',    label:'Sub Channel',      required:false, keywords:['ชื่อช่องทางการขาย','sub_channel','channel'] },
  { key:'customer_name',  label:'ชื่อลูกค้า',       required:false, keywords:['ลูกค้า','ชื่อ','customer','ชื่อผู้รับ'] },
  { key:'phone',          label:'เบอร์โทร',         required:false, keywords:['เบอร์โทร1','เบอร์โทร','phone'] },
  { key:'province',       label:'จังหวัด',          required:false, keywords:['จังหวัด','province'] },
  { key:'district',       label:'อำเภอ/เขต',        required:false, keywords:['เขต/ อำเภอ','อำเภอ','เขต','district'] },
  { key:'postcode',       label:'ไปรษณีย์',         required:false, keywords:['รหัสไปรษณีย์','postcode'] },
  { key:'payment_method', label:'ชำระเงิน',         required:false, keywords:['การชำระเงิน','payment'] },
  { key:'sku_promotion',  label:'SKU',              required:true,  keywords:['รหัสสินค้า (sku) (จำนวน)','รหัสสินค้า','sku','sellersku','เลขอ้างอิง sku'] },
  { key:'revenue',        label:'ยอดรวม',           required:true,  keywords:['รวมทั้งสิ้น','ยอดรวม','revenue','total'] },
]

let rawHeaders=[], rawData=[], mappings={}, channel='', processed=[]

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('auth'); window.location.href = 'index.html'
})
document.getElementById('btnStep1').addEventListener('click', handleStep1)
document.getElementById('btnStep2').addEventListener('click', handleStep2)
document.getElementById('btnBack2').addEventListener('click', () => goStep(1))
document.getElementById('btnBack3').addEventListener('click', () => goStep(2))
document.getElementById('btnConfirm').addEventListener('click', handleConfirm)

const fileInput = document.getElementById('fileInput')
const dropLabel = document.getElementById('dropLabel')

fileInput.addEventListener('change', function() {
  const file = this.files[0]; if (!file) return
  dropLabel.classList.add('has-file')
  document.getElementById('dropIcon').textContent = '✅'
  document.getElementById('dropMain').innerHTML = '<strong style="color:#10b981">' + file.name + '</strong>'
  document.getElementById('dropSub').textContent = (file.size/1024).toFixed(0) + ' KB'
})

dropLabel.addEventListener('dragover', e => { e.preventDefault(); dropLabel.style.borderColor='#6366f1' })
dropLabel.addEventListener('dragleave', () => { dropLabel.style.borderColor='' })
dropLabel.addEventListener('drop', e => {
  e.preventDefault(); dropLabel.style.borderColor=''
  const f = e.dataTransfer.files[0]; if (!f) return
  const dt = new DataTransfer(); dt.items.add(f)
  fileInput.files = dt.files
  fileInput.dispatchEvent(new Event('change'))
})

async function handleStep1() {
  channel = document.getElementById('channelSelect').value
  const file = fileInput.files[0]
  const al = document.getElementById('alert1')
  if (!channel) return showAlert(al, 'กรุณาเลือก Channel ก่อน')
  if (!file) return showAlert(al, 'กรุณาเลือกไฟล์')
  al.style.display = 'none'
  try {
    const d = await readExcel(file)
    rawHeaders=d.headers; rawData=d.rows
    console.log('DATE VALUE:', rawData[0][rawHeaders.find(h => h.includes('วันที่'))])
    console.log('DATE TYPE:', typeof rawData[0][rawHeaders.find(h => h.includes('วันที่'))])
    buildMapping(); goStep(2)
  } catch(e) { showAlert(al, 'อ่านไฟล์ไม่ได้: '+e.message) }
}

function buildMapping() {
  const wrap = document.getElementById('mappingRows')
  wrap.innerHTML = ''
  FIELDS.forEach(f => {
    const matched = autoMatch(f.keywords, rawHeaders)
    const item = document.createElement('div')
    item.className = 'map-item'
    item.innerHTML = `
      <div>
        <span class="map-field-name">${f.label}${f.required?'<span class="map-field-req">*</span>':''}</span>
        <span class="badge ${matched?'badge-auto':'badge-manual'}">${matched?'✓ auto':'เลือกเอง'}</span>
      </div>
      <select id="map_${f.key}" class="map-select ${matched?'matched':''}">
        <option value="">— ไม่ใช้ —</option>
        ${rawHeaders.map(h=>`<option value="${h}" ${h===matched?'selected':''}>${h}</option>`).join('')}
      </select>`
    wrap.appendChild(item)
  })
}

function autoMatch(kws, headers) {
  for (const kw of kws) {
    const ex = headers.find(h=>h.toLowerCase().trim()===kw.toLowerCase().trim())
    if (ex) return ex
    const pt = headers.find(h=>h.toLowerCase().includes(kw.toLowerCase()))
    if (pt) return pt
  }
  return null
}

async function handleStep2() {
  const al = document.getElementById('alert2')
  mappings = {}
  FIELDS.forEach(f => { const v=document.getElementById('map_'+f.key).value; if(v) mappings[f.key]=v })
  const miss = FIELDS.filter(f=>f.required&&!mappings[f.key])
  if (miss.length) return showAlert(al, 'กรุณาเลือกคอลัมน์: '+miss.map(f=>f.label).join(', '))
  al.style.display='none'
  processed = await processRows(rawData, mappings, channel)
  const uniq = new Set(processed.map(r=>r.order_id)).size
  document.getElementById('summaryGrid').innerHTML=`
    <div class="stat-box"><div class="stat-num">${rawData.length.toLocaleString()}</div><div class="stat-label">แถวในไฟล์</div></div>
    <div class="stat-box"><div class="stat-num">${processed.length.toLocaleString()}</div><div class="stat-label">จะ Upsert</div></div>
    <div class="stat-box"><div class="stat-num">${uniq.toLocaleString()}</div><div class="stat-label">Order ไม่ซ้ำ</div></div>`
  const cols = ['date','order_id','sku_promotion','revenue','province','payment_method']
  document.getElementById('previewTbl').innerHTML=
    '<tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>'+
    processed.slice(0,5).map(r=>'<tr>'+cols.map(c=>`<td>${r[c]??''}</td>`).join('')+'</tr>').join('')
  goStep(3)
}

async function handleConfirm() {
  const btn=document.getElementById('btnConfirm'), back=document.getElementById('btnBack3')
  const al=document.getElementById('alert3'), pt=document.getElementById('progressTrack'), pf=document.getElementById('progressFill')
  btn.disabled=true; back.disabled=true; btn.textContent='กำลัง Upload...'
  pt.style.display='block'; al.style.display='none'
  try {
    const BATCH=500; let done=0
    for (let i=0;i<processed.length;i+=BATCH) {
      const {error} = await DB.from('orders').upsert(processed.slice(i,i+BATCH),{onConflict:'order_id'})
      if (error) throw error
      done+=Math.min(BATCH,processed.length-i)
      pf.style.width=Math.round(done/processed.length*100)+'%'
    }
    await DB.rpc('refresh_all_views')
    al.className='alert alert-success'
    al.textContent='✓ Upload สำเร็จ — '+processed.length.toLocaleString()+' ออเดอร์เข้าระบบแล้ว'
    al.style.display='block'; btn.textContent='✓ เสร็จแล้ว'; back.disabled=false
  } catch(e) {
    al.className='alert alert-error'; al.textContent='เกิดข้อผิดพลาด: '+e.message
    al.style.display='block'; btn.disabled=false; btn.textContent='✓ ยืนยัน Upload'; back.disabled=false
  }
}

function readExcel(file) {
  return new Promise((res,rej) => {
    const r=new FileReader()
    r.onload=e=>{
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: false })
        const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''})
        if(!json.length) throw new Error('ไฟล์ว่างเปล่า')
        res({headers:Object.keys(json[0]),rows:json})
      } catch(err){rej(err)}
    }
    r.onerror=()=>rej(new Error('อ่านไฟล์ไม่ได้'))
    r.readAsBinaryString(file)
  })
}

async function processRows(rows,mappings,channel) {
  const {data:prods}=await DB.from('products').select('child_sku,parent_sku')
  const skuMap={}; if(prods) prods.forEach(p=>skuMap[p.child_sku.toUpperCase()]=p.parent_sku.toUpperCase())
  const {data:chs}=await DB.from('channels').select('sub_channel,channel')
  const chMap={}; if(chs) chs.forEach(c=>chMap[c.sub_channel]=c.channel)
  const tfMap={Facebook:tfFB,TikTok:tfTT,Shopee:tfShopee,Lazada:tfLazada,'ตัวแทน':tfDealer,'Modern Trade':tfDealer}
  const tfn=tfMap[channel]||tfGeneric
  return rows.map(row=>{
    const g=k=>mappings[k]?String(row[mappings[k]]??'').trim():''
    const rawSku=g('sku_promotion'),sub=g('sub_channel'),rawDate=g('date'),date=parseDate(rawDate)
    return {
      order_id:g('order_id'),date,channel:chMap[sub]||channel,sub_channel:sub||channel,
      sku_promotion:tfn(rawSku,skuMap),revenue:parseFloat(g('revenue').replace(/,/g,''))||0,
      province:g('province'),district:g('district'),postcode:g('postcode'),
      customer_name:g('customer_name'),phone:g('phone'),payment_method:g('payment_method'),
      settled:channel==='Facebook',settled_date:channel==='Facebook'?date:null,
    }
  }).filter(r=>r.order_id)
}

function norm(s,m){const c=s.toUpperCase().replace(/[-\.]/g,'').trim();return m[c]||c}
function tfFB(raw,m){
  if(!raw)return''
  return raw.split(',').map(s=>s.trim()).map(p=>{const x=p.match(/^(.+?)\s*\((\d+)\)$/);return x?{sku:norm(x[1],m),qty:parseInt(x[2])}:null})
    .filter(Boolean).sort((a,b)=>a.sku.localeCompare(b.sku)).map(s=>`${s.sku}x${s.qty}`).join('+')
}
function tfTT(raw,m){
  if(!raw)return'';const res=[]
  raw.split(',').map(s=>s.trim()).forEach(g=>{
    const mg=g.match(/^(.+?)\s*\((\d+)\)$/);if(!mg)return;const mul=parseInt(mg[2])
    mg[1].split('+').map(s=>s.trim()).forEach(it=>{const mi=it.match(/^(.+?)x(\d+)$/i);if(!mi)return;res.push({sku:norm(mi[1],m),qty:parseInt(mi[2])*mul})})
  })
  return res.sort((a,b)=>a.sku.localeCompare(b.sku)).map(s=>`${s.sku}x${s.qty}`).join('+')
}
function tfShopee(raw,m){
  if(!raw)return''
  return raw.split('+').map(s=>s.trim()).map(p=>{const x=p.match(/^(.+?)x(\d+)$/i);return x?{sku:norm(x[1],m),qty:parseInt(x[2])}:null})
    .filter(Boolean).sort((a,b)=>a.sku.localeCompare(b.sku)).map(s=>`${s.sku}x${s.qty}`).join('+')
}
function tfLazada(raw,m){if(!raw)return'';const x=raw.trim().match(/^(.+?)x(\d+)$/i);return x?norm(x[1],m)+'x'+x[2]:norm(raw,m)}
function tfDealer(raw,m){return raw?norm(raw,m):''}
function tfGeneric(raw,m){return raw?norm(raw,m):''}

function parseDate(v) {
  if (!v) return null
  if (v instanceof Date) {
  const d = v
  const year = d.getUTCFullYear()
  const month = String(d.getUTCMonth()+1).padStart(2,'0')
  const day = String(d.getUTCDate()).padStart(2,'0')
  return year + '-' + month + '-' + day
}
  const s = String(v).trim()
  const dm = s.match(/^(\d{4}-\d{2}-\d{2})/)
  if (dm) return dm[1]
  const th = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/)
  if (th) return th[3] + '-' + th[2].padStart(2,'0') + '-' + th[1].padStart(2,'0')
  if (/^\d+$/.test(s)) {
    const d = new Date((parseInt(s) - 25569) * 86400 * 1000)
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0')
  }
  return null
}

function goStep(n){
  document.querySelectorAll('.step-panel').forEach((el,i)=>el.classList.toggle('active',i+1===n))
  ;[1,2,3].forEach(i=>{
    const num=document.getElementById('snum'+i),lbl=document.getElementById('slabel'+i)
    num.classList.remove('active','done');lbl.classList.remove('active')
    if(i<n){num.classList.add('done');num.textContent='✓'}
    else if(i===n){num.classList.add('active');num.textContent=i;lbl.classList.add('active')}
    else num.textContent=i
  })
  ;[1,2].forEach(i=>document.getElementById('sline'+i).classList.toggle('done',i<n))
  window.scrollTo(0,0)
}

function showAlert(el,msg){el.textContent=msg;el.style.display='block'}
