<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload | Deesay</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #f0f4ff; --muted: #6b7a99; --accent: #6366f1; --accent2: #818cf8;
      --success: #10b981; --danger: #ef4444; --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 52px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .nav-logo { font-size: 0.8rem; font-weight: 700; letter-spacing: 3px; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-link { font-size: 0.8rem; color: var(--muted); text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    .btn-ghost { font-size: 0.8rem; color: var(--muted); background: none; border: 1px solid var(--border2); padding: 4px 12px; border-radius: 6px; cursor: pointer; }
    main { display: flex; justify-content: center; padding: 36px 24px; }
    .shell { width: 100%; max-width: 720px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
    .page-header p { font-size: 0.82rem; color: var(--muted); }
    .step-track { display: flex; align-items: center; margin-bottom: 24px; }
    .step-item { display: flex; align-items: center; gap: 8px; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; border: 1.5px solid var(--border2); color: var(--muted); flex-shrink: 0; transition: all 0.2s; }
    .step-num.active { background: var(--accent); border-color: var(--accent); color: white; }
    .step-num.done { background: var(--success); border-color: var(--success); color: white; }
    .step-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .step-label.active { color: var(--text); }
    .step-line { flex: 1; height: 1px; background: var(--border2); margin: 0 10px; }
    .step-line.done { background: var(--success); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }
    .step1-grid { display: grid; grid-template-columns: 200px 1fr; gap: 16px; align-items: start; margin-bottom: 20px; }
    .step1-left { display: flex; flex-direction: column; gap: 12px; }
    .field-label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .req { color: var(--danger); }
    select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); padding: 9px 12px; font-size: 0.85rem; font-family: inherit; outline: none; cursor: pointer; }
    select:focus { border-color: var(--accent); }
    select option { background: #1a2235; }
    #fileInput { display: none; }
    .drop-label { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s; min-height: 80px; }
    .drop-label:hover { border-color: var(--accent); background: rgba(99,102,241,0.04); }
    .drop-label.has-file { border-color: var(--success); background: rgba(16,185,129,0.04); }
    .drop-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .drop-main { font-size: 0.82rem; color: var(--muted); }
    .drop-main strong { color: var(--text); }
    .drop-sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    .map-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .map-item { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: center; background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; }
    .map-field-name { font-size: 0.8rem; font-weight: 500; color: var(--text); }
    .map-field-req { color: var(--danger); font-size: 0.7rem; }
    .badge { display: inline-flex; font-size: 0.65rem; padding: 1px 6px; border-radius: 99px; margin-left: 4px; vertical-align: middle; }
    .badge-auto { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-manual { background: rgba(251,146,60,0.15); color: #fb923c; }
    .map-select { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 6px 8px; font-size: 0.78rem; font-family: inherit; outline: none; }
    .map-select:focus { border-color: var(--accent); }
    .map-select.matched { border-color: rgba(16,185,129,0.35); }
    .map-select option { background: #0a0f1e; }
    .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .stat-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
    .stat-num { font-size: 1.4rem; font-weight: 600; color: var(--accent2); }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .preview-wrap { overflow-x: auto; margin-bottom: 4px; }
    .preview-tbl { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .preview-tbl th { background: var(--surface2); padding: 7px 10px; text-align: left; color: var(--muted); font-weight: 500; white-space: nowrap; }
    .preview-tbl td { padding: 7px 10px; border-top: 1px solid var(--border); white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .preview-tbl tr:hover td { background: var(--surface2); }
    .progress-track { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; margin-top: 16px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }
    .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 20px; }
    .btn-primary { display: inline-flex; align-items: center; padding: 9px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }
    .btn-back { display: inline-flex; align-items: center; padding: 9px 16px; background: none; color: var(--muted); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .btn-back:hover { color: var(--text); border-color: var(--muted); }
    .alert { border-radius: var(--radius-sm); padding: 10px 14px; font-size: 0.82rem; margin-top: 12px; }
    .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .step-panel { display: none; }
    .step-panel.active { display: block; }

    /* Success state */
    .success-banner { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .success-banner-icon { font-size: 20px; }
    .success-banner-title { font-size: 14px; font-weight: 600; color: #6ee7b7; }
    .success-banner-sub { font-size: 12px; color: #6ee7b7; opacity: 0.8; margin-top: 1px; }
    .success-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
    .success-stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
    .success-stat-num { font-size: 1.35rem; font-weight: 600; color: var(--accent2); }
    .success-stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .success-divider { border-top: 1px solid var(--border); padding-top: 16px; }
    .success-action-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 12px; }
    .success-actions { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .action-card { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 14px 12px; cursor: pointer; text-align: left; color: var(--text); font-family: inherit; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.15s, background 0.15s; }
    .action-card:hover { border-color: var(--accent); background: rgba(99,102,241,0.06); }
    .action-card-icon { font-size: 1.2rem; }
    .action-card-title { font-size: 0.82rem; font-weight: 600; }
    .action-card-sub { font-size: 0.7rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <div class="nav-logo">DEESAY</div>
  <div class="nav-right">
    <a href="index.html" class="nav-link">← หน้าแรก</a>
    <button class="btn-ghost" id="logoutBtn">ออกจากระบบ</button>
  </div>
</nav>
<main>
<div class="shell">
  <div class="page-header">
    <h1>Upload ข้อมูลยอดขาย</h1>
    <p>นำเข้าไฟล์รายงานจากแต่ละช่องทาง ระบบจะจับคู่คอลัมน์และบันทึกเข้าฐานข้อมูลให้อัตโนมัติ</p>
  </div>
  <div class="step-track">
    <div class="step-item">
      <div class="step-num active" id="snum1">1</div>
      <div class="step-label active" id="slabel1">เลือกไฟล์</div>
    </div>
    <div class="step-line" id="sline1"></div>
    <div class="step-item">
      <div class="step-num" id="snum2">2</div>
      <div class="step-label" id="slabel2">จับคู่คอลัมน์</div>
    </div>
    <div class="step-line" id="sline2"></div>
    <div class="step-item">
      <div class="step-num" id="snum3">3</div>
      <div class="step-label" id="slabel3">ยืนยัน</div>
    </div>
  </div>

  <div class="step-panel active" id="panel1">
    <div class="card">
      <div class="section-title">เลือก Channel และไฟล์</div>
      <div class="step1-grid">
        <div class="step1-left">
          <div>
            <label class="field-label">Channel <span class="req">*</span></label>
            <select id="channelSelect">
              <option value="">— เลือก —</option>
              <option value="Facebook">Facebook</option>
              <option value="TikTok">TikTok</option>
              <option value="Shopee">Shopee</option>
              <option value="Lazada">Lazada</option>
              <option value="ตัวแทน">ตัวแทน</option>
              <option value="Modern Trade">Modern Trade</option>
            </select>
          </div>
          <div id="storeWrap" style="display:none">
            <label class="field-label">ร้านค้า <span class="req">*</span></label>
            <select id="storeSelect">
              <option value="">— เลือกร้าน —</option>
            </select>
          </div>
        </div>
        <div id="fileWrap">
          <label class="field-label">ไฟล์ Excel หรือ CSV <span class="req">*</span></label>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
          <label class="drop-label" id="dropLabel" for="fileInput">
            <span class="drop-icon" id="dropIcon">📂</span>
            <div class="drop-main" id="dropMain"><strong>คลิกเพื่อเลือกไฟล์</strong> หรือลากมาวาง</div>
            <div class="drop-sub" id="dropSub">.xlsx .xls .csv</div>
          </label>
        </div>
      </div>
      <div id="alert1" class="alert alert-error" style="display:none"></div>
      <div class="btn-row">
        <button class="btn-primary" id="btnStep1">ถัดไป →</button>
      </div>
    </div>
  </div>

  <div class="step-panel" id="panel2">
    <div class="card">
      <div class="section-title">จับคู่คอลัมน์</div>
      <p class="map-info">ระบบ auto-match คอลัมน์ให้แล้ว ตรวจสอบและแก้ไขถ้าไม่ถูกต้อง</p>
      <div class="map-grid" id="mappingRows"></div>
      <div id="alert2" class="alert alert-error" style="display:none"></div>
      <div class="btn-row">
        <button class="btn-back" id="btnBack2">← ย้อนกลับ</button>
        <button class="btn-primary" id="btnStep2">Preview →</button>
      </div>
    </div>
  </div>

  <div class="step-panel" id="panel3">
    <div class="card">
      <div class="section-title">ตรวจสอบก่อน Upload</div>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="preview-wrap"><table class="preview-tbl" id="previewTbl"></table></div>
      <div class="progress-track" id="progressTrack" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div id="alert3" class="alert" style="display:none"></div>
      <div class="btn-row" id="btnRow3">
        <button class="btn-back" id="btnBack3">← ย้อนกลับ</button>
        <button class="btn-primary" id="btnConfirm">✓ ยืนยัน Upload</button>
      </div>
    </div>
  </div>
</div>
</main>

<script src="config.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

if (sessionStorage.getItem('auth') !== 'true') {
  window.location.href = 'login.html?redirect=upload.html'
}

const DB = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)

const BASE_FIELDS = [
  { key:'order_id',       label:'Order ID',        required:true,  keywords:['เลขที่คำสั่งซื้อ','หมายเลขคำสั่งซื้อ','order id','orderid','order_id','ordernumber'] },
  { key:'date',           label:'วันที่สั่งซื้อ',   required:true,  keywords:['createtime','วันที่สั่งซื้อ','วันที่','date'] },
  { key:'sub_channel',    label:'Sub Channel',      required:false, keywords:['ชื่อช่องทางการขาย','sub_channel','channel'] },
  { key:'customer_name',  label:'ชื่อลูกค้า',       required:false, keywords:['ลูกค้า','ชื่อ','customer','ชื่อผู้รับ'] },
  { key:'phone',          label:'เบอร์โทร',         required:false, keywords:['หมายเลขโทรศัพท์','เบอร์โทร1','เบอร์โทร','phone'] },
  { key:'province',       label:'จังหวัด',          required:false, keywords:['จังหวัด','province','billingaddr3'] },
  { key:'district',       label:'อำเภอ/เขต',        required:false, keywords:['เขต/ อำเภอ','อำเภอ','เขต','district','billingaddr4'] },
  { key:'postcode',       label:'ไปรษณีย์',         required:false, keywords:['รหัสไปรษณีย์','postcode'] },
  { key:'payment_method', label:'ชำระเงิน',         required:false, keywords:['การชำระเงิน','payment','paymethod'] },
  { key:'sku_promotion',  label:'SKU',              required:true,  keywords:['เลขอ้างอิง sku (sku reference no.)','รหัสสินค้า (sku) (จำนวน)','รหัสสินค้า','sku','sellersku','เลขอ้างอิง sku'] },
]

const REVENUE_FIELDS = {
  Facebook: [
    { key:'rev_subtotal',  label:'ยอดรวมสินค้า',      required:true,  keywords:['ยอดรวมสินค้า','ยอดรวมคำสั่งซื้อ'] },
    { key:'rev_discount',  label:'ส่วนลดท้ายบิล',     required:false, keywords:['ส่วนลดท้ายบิล','ส่วนลดบิล'] },
    { key:'rev_shipping',  label:'ค่าขนส่ง',           required:false, keywords:['ค่าส่ง','ค่าขนส่ง','shipping'] },
  ],
  TikTok: [
    { key:'rev_subtotal',  label:'ยอดรวมสินค้า',      required:true,  keywords:['ยอดรวมสินค้า','ยอดรวมคำสั่งซื้อ'] },
    { key:'rev_discount',  label:'ส่วนลดร้านค้าต่อรายการ', required:false, keywords:['ส่วนลดร้านค้าต่อรายการ','seller discount'] },
  ],
  Shopee: [
    { key:'rev_subtotal',  label:'ราคาขาย',            required:true,  keywords:['ราคาขาย','subtotal'] },
    { key:'rev_platform',  label:'ส่วนลดจาก Shopee',   required:false, keywords:['ส่วนลดจาก shopee','ส่วนลดแพลตฟอร์ม','shopee discount'] },
    { key:'rev_seller_discount', label:'โค้ดส่วนลดชำระโดยผู้ขาย', required:false, keywords:['โค้ดส่วนลดชำระโดยผู้ขาย','seller voucher'] },
    { key:'rev_shipping',  label:'ค่าจัดส่งที่ชำระโดยผู้ซื้อ', required:false, keywords:['ค่าจัดส่งที่ชำระโดยผู้ซื้อ','buyer shipping'] },
  ],
  Lazada: [
    { key:'rev_subtotal',  label:'unitPrice',          required:true,  keywords:['unitPrice','unit price','ราคาต่อหน่วย'] },
    { key:'rev_discount',  label:'sellerDiscountTotal', required:false, keywords:['sellerDiscountTotal','seller discount total'] },
  ],
  'ตัวแทน': [
    { key:'rev_subtotal',  label:'ยอดรวม',             required:true,  keywords:['รวมทั้งสิ้น','ยอดรวม','total'] },
  ],
  'Modern Trade': [
    { key:'rev_subtotal',  label:'ยอดรวม',             required:true,  keywords:['รวมทั้งสิ้น','ยอดรวม','total'] },
  ],
}

function calcRevenue(channel, m, row) {
  const getNum = key => {
    if (!m[key]) return 0
    const v = row[m[key]]
    if (v === null || v === undefined || v === '') return 0
    return parseFloat(String(v).replace(/,/g, '')) || 0
  }
  switch(channel) {
    case 'Facebook': return getNum('rev_subtotal') - getNum('rev_discount') + getNum('rev_shipping')
    case 'TikTok':   return getNum('rev_subtotal') - getNum('rev_discount')
    case 'Shopee':   return getNum('rev_subtotal') + getNum('rev_platform') - getNum('rev_seller_discount') + getNum('rev_shipping')
    case 'Lazada':   return getNum('rev_subtotal') - getNum('rev_discount')
    default:         return getNum('rev_subtotal')
  }
}

function getFields(channel) {
  const revFields = REVENUE_FIELDS[channel] || [
    { key:'rev_subtotal', label:'ยอดรวม', required:true, keywords:['รวมทั้งสิ้น','ยอดรวม','total'] }
  ]
  let base = BASE_FIELDS
  // Lazada ไม่มีจังหวัด/อำเภอที่เชื่อถือได้ (บางร้านมี บางร้านไม่มี) → ตัดออกเสมอ ให้ blank
  if (channel === 'Lazada') {
    base = BASE_FIELDS.filter(f => f.key !== 'province' && f.key !== 'district')
  }
  return [...base, ...revFields]
}

let FIELDS = BASE_FIELDS
let rawHeaders=[], rawData=[], mappings={}, channel='', processed=[]

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('auth'); window.location.href = 'index.html'
})
document.getElementById('channelSelect').addEventListener('change', e => handleChannelChange(e.target.value))
document.getElementById('btnStep1').addEventListener('click', handleStep1)
document.getElementById('btnStep2').addEventListener('click', handleStep2)
document.getElementById('btnBack2').addEventListener('click', () => goStep(1))
document.getElementById('btnBack3').addEventListener('click', () => goStep(2))
document.getElementById('btnConfirm').addEventListener('click', handleConfirm)

const fileInput = document.getElementById('fileInput')
const dropLabel = document.getElementById('dropLabel')

fileInput.addEventListener('change', function() {
  const file = this.files[0]
  if (!file) return
  dropLabel.classList.add('has-file')
  document.getElementById('dropIcon').textContent = '✅'
  document.getElementById('dropMain').innerHTML = '<strong style="color:#10b981">' + file.name + '</strong>'
  document.getElementById('dropSub').textContent = (file.size/1024).toFixed(0) + ' KB'
})

dropLabel.addEventListener('dragover', e => { e.preventDefault(); dropLabel.style.borderColor='#6366f1' })
dropLabel.addEventListener('dragleave', () => { dropLabel.style.borderColor='' })
dropLabel.addEventListener('drop', e => {
  e.preventDefault(); dropLabel.style.borderColor=''
  const f = e.dataTransfer.files[0]; if (!f) return
  const dt = new DataTransfer(); dt.items.add(f)
  fileInput.files = dt.files
  fileInput.dispatchEvent(new Event('change'))
})

const STORE_OPTIONS = {
  Shopee: ['Shopee Mall', 'Shopee 24hr'],
  Lazada: ['Lazada Mall', 'Lazada 24hr'],
}

window.handleChannelChange = function handleChannelChange(val) {
  const storeWrap = document.getElementById('storeWrap')
  const storeSelect = document.getElementById('storeSelect')
  if (STORE_OPTIONS[val]) {
    storeWrap.style.display = 'block'
    storeSelect.innerHTML = '<option value="">— เลือกร้าน —</option>' +
      STORE_OPTIONS[val].map(s => `<option value="${s}">${s}</option>`).join('')
  } else {
    storeWrap.style.display = 'none'
    storeSelect.value = ''
  }
}
handleChannelChange(document.getElementById('channelSelect').value)

async function handleStep1() {
  channel = document.getElementById('channelSelect').value
  const storeVal = document.getElementById('storeSelect').value
  const file = fileInput.files[0]
  const al = document.getElementById('alert1')
  if (!channel) return showAlert(al, 'กรุณาเลือก Channel ก่อน')
  if (STORE_OPTIONS[channel] && !storeVal) return showAlert(al, 'กรุณาเลือกร้านค้า')
  if (!file) return showAlert(al, 'กรุณาเลือกไฟล์')
  al.style.display = 'none'
  FIELDS = getFields(channel)
  try {
    const d = await readExcel(file)
    rawHeaders = d.headers
    rawData = d.rows
    buildMapping()
    goStep(2)
  } catch(e) { showAlert(al, 'อ่านไฟล์ไม่ได้: ' + e.message) }
}

function buildMapping() {
  const wrap = document.getElementById('mappingRows')
  wrap.innerHTML = ''
  const storeVal = document.getElementById('storeSelect').value
  FIELDS.forEach(f => {
    // ถ้า sub_channel และมีร้านค้าเลือกไว้แล้ว → แสดง readonly ไม่ต้องให้เลือก
    if (f.key === 'sub_channel' && storeVal) {
      const item = document.createElement('div')
      item.className = 'map-item'
      item.innerHTML = `
        <div>
          <span class="map-field-name">${f.label}</span>
          <span class="badge badge-auto">✓ auto</span>
        </div>
        <div style="font-size:0.8rem;color:#10b981;padding:6px 8px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:6px">${storeVal}</div>`
      wrap.appendChild(item)
      return
    }
    const matched = autoMatch(f.keywords, rawHeaders)
    const item = document.createElement('div')
    item.className = 'map-item'
    item.innerHTML = `
      <div>
        <span class="map-field-name">${f.label}${f.required ? '<span class="map-field-req">*</span>' : ''}</span>
        <span class="badge ${matched ? 'badge-auto' : 'badge-manual'}">${matched ? '✓ auto' : 'เลือกเอง'}</span>
      </div>
      <select id="map_${f.key}" class="map-select ${matched ? 'matched' : ''}">
        <option value="">— ไม่ใช้ —</option>
        ${rawHeaders.map(h => `<option value="${h}" ${h === matched ? 'selected' : ''}>${h}</option>`).join('')}
      </select>`
    wrap.appendChild(item)
  })
}

function autoMatch(kws, headers) {
  for (const kw of kws) {
    const ex = headers.find(h => h.toLowerCase().trim() === kw.toLowerCase().trim())
    if (ex) return ex
    const pt = headers.find(h => h.toLowerCase().includes(kw.toLowerCase()))
    if (pt) return pt
  }
  return null
}

async function handleStep2() {
  const al = document.getElementById('alert2')
  mappings = {}
  FIELDS.forEach(f => {
    const el = document.getElementById('map_' + f.key)
    if (!el) return  // sub_channel แสดง readonly badge ไม่มี select element
    const v = el.value
    if (v) mappings[f.key] = v
  })
  const miss = FIELDS.filter(f => f.required && !mappings[f.key])
  if (miss.length) return showAlert(al, 'กรุณาเลือกคอลัมน์: ' + miss.map(f => f.label).join(', '))
  al.style.display = 'none'
  const storeVal = document.getElementById('storeSelect').value || null
  processed = await processRows(rawData, mappings, channel, storeVal)
  const uniq = new Set(processed.map(r => r.order_id)).size
  document.getElementById('summaryGrid').innerHTML = `
    <div class="stat-box"><div class="stat-num">${rawData.length.toLocaleString()}</div><div class="stat-label">แถวในไฟล์</div></div>
    <div class="stat-box"><div class="stat-num">${uniq.toLocaleString()}</div><div class="stat-label">จะ Upsert (Order ไม่ซ้ำ)</div></div>
    <div class="stat-box"><div class="stat-num">${processed.length.toLocaleString()}</div><div class="stat-label">SKU rows ที่จะคำนวณ</div></div>`
  const cols = ['date', 'order_id', 'sku_promotion', 'revenue', 'province', 'payment_method']
  document.getElementById('previewTbl').innerHTML =
    '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>' +
    processed.slice(0, 5).map(r => '<tr>' + cols.map(c => `<td>${r[c] ?? ''}</td>`).join('') + '</tr>').join('')
  goStep(3)

function readExcel(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader()
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result)
        const wb = XLSX.read(data, { type: 'array', cellDates: true })
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' })
        if (!json.length) throw new Error('ไฟล์ว่างเปล่า')
        res({ headers: Object.keys(json[0]), rows: json })
      } catch(err) { rej(err) }
    }
    reader.onerror = () => rej(new Error('อ่านไฟล์ไม่ได้'))
    reader.readAsArrayBuffer(file)
  })
}

function parseDate(v) {
  if (v === null || v === undefined || v === '') return null
  if (v instanceof Date) {
    const y = v.getUTCFullYear()
    const m = String(v.getUTCMonth() + 1).padStart(2, '0')
    const d = String(v.getUTCDate()).padStart(2, '0')
    return y + '-' + m + '-' + d
  }
  if (typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000))
    const y = d.getUTCFullYear()
    const mo = String(d.getUTCMonth() + 1).padStart(2, '0')
    const da = String(d.getUTCDate()).padStart(2, '0')
    return y + '-' + mo + '-' + da
  }
  const s = String(v).trim()
  if (!s || s === '-') return null
  const m = s.match(/^(\d{4}-\d{2}-\d{2})/)
  if (m) return m[1]
  // รูปแบบ "31 Jan 2026 23:58" (DD Mon YYYY HH:mm) — Lazada บางไฟล์ส่งมาแบบนี้
  const mEng = s.match(/^(\d{1,2})\s+([A-Za-z]{3,})\s+(\d{4})/)
  if (mEng) {
    const months = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'}
    const mo = months[mEng[2].toLowerCase().slice(0,3)]
    if (mo) {
      const da = mEng[1].padStart(2, '0')
      return mEng[3] + '-' + mo + '-' + da
    }
  }
  if (/^\d+(\.\d+)?$/.test(s)) {
    const n = parseFloat(s)
    const d = new Date(Math.round((n - 25569) * 86400 * 1000))
    const y = d.getUTCFullYear()
    const mo = String(d.getUTCMonth() + 1).padStart(2, '0')
    const da = String(d.getUTCDate()).padStart(2, '0')
    return y + '-' + mo + '-' + da
  }
  return null
}

async function processRows(rows, mappings, channel, forcedSubChannel = null) {
  const { data: prods } = await DB.from('products').select('child_sku,parent_sku')
  const skuMap = {}
  if (prods) prods.forEach(p => skuMap[p.child_sku.toUpperCase()] = p.parent_sku.toUpperCase())
  const { data: chs } = await DB.from('channels').select('sub_channel,channel')
  const chMap = {}
  if (chs) chs.forEach(c => chMap[c.sub_channel] = c.channel)
  const tfMap = { Facebook: tfFB, TikTok: tfTT, Shopee: tfShopee, Lazada: tfLazada, 'ตัวแทน': tfDealer, 'Modern Trade': tfDealer }
  const tfn = tfMap[channel] || tfGeneric
  const newSubChannels = new Set()

  const processed = rows.map(row => {
    const g = k => mappings[k] ? row[mappings[k]] : null
    const gs = k => { const v = g(k); return v !== null && v !== undefined ? String(v).trim() : '' }
    const date = parseDate(g('date'))
    const sub = forcedSubChannel || gs('sub_channel')
    const rawSku = gs('sku_promotion')
    if (sub && !chMap[sub]) newSubChannels.add(sub)
    const revenue = calcRevenue(channel, mappings, row)
    const revenueRaw = (() => {
      const v = mappings['rev_subtotal'] ? row[mappings['rev_subtotal']] : null
      if (!v) return 0
      return parseFloat(String(v).replace(/,/g, '')) || 0
    })()
    return {
      order_id: gs('order_id'),
      date: date,
      channel: chMap[sub] || channel,
      sub_channel: sub || channel,
      sku_promotion: tfn(rawSku, skuMap),
      sku_promotion_raw: rawSku,
      revenue: revenue,
      revenue_raw: revenueRaw,
      province: normalizeProvince(gs('province')),
      district: normalizeDistrict(gs('district')),
      postcode: gs('postcode'),
      customer_name: gs('customer_name'),
      phone: gs('phone'),
      payment_method: gs('payment_method'),
      settled: channel === 'Facebook',
      settled_date: channel === 'Facebook' ? date : null,
    }
  }).filter(r => r.order_id)

  if (newSubChannels.size > 0) {
    const newRows = [...newSubChannels].map(sub => ({ sub_channel: sub, channel: channel }))
    await DB.from('channels').upsert(newRows, { onConflict: 'sub_channel' })
  }

  return processed
}

function norm(s, m) { const c = s.toUpperCase().replace(/[-\.]/g, '').trim(); return m[c] || c }

function normalizeProvince(v) {
  if (!v) return ''
  let s = String(v).trim()
  // Lazada ส่งมาแบบ "ปทุมธานี/ Pathum Thani" — ตัดเอาส่วนก่อน / ก่อน
  if (s.includes('/')) s = s.split('/')[0].trim()
  // เผื่อมีคำว่า "จังหวัด" นำหน้า เช่น "จังหวัดนครราชสีมา"
  s = s.replace(/^จังหวัด/, '').trim()
  return PROVINCE_MAP[s] || s
}

function normalizeDistrict(v) {
  if (!v) return ''
  let s = String(v).trim()
  // Lazada ส่งมาแบบ "เมืองปทุมธานี/ Mueang Pathum Thani" — ตัดเอาส่วนก่อน / ก่อน (ภาษาไทย)
  if (s.includes('/')) s = s.split('/')[0].trim()
  return s
}

async function calcSkuRevenue(orders) {
  const { data: prods } = await DB.from('products').select('parent_sku, product_name, rsp')
  const rspMap = {}
  const nameMap = {}
  if (prods) prods.forEach(p => {
    if (!rspMap[p.parent_sku]) rspMap[p.parent_sku] = p.rsp || 0
    if (!nameMap[p.parent_sku]) nameMap[p.parent_sku] = p.product_name || p.parent_sku
  })

  const skuRows = []

  for (const order of orders) {
    if (!order.sku_promotion || !order.revenue) continue
    const skus = order.sku_promotion.split('+').map(s => {
      const m = s.trim().match(/^(.+?)x(\d+)$/i)
      return m ? { sku: m[1], qty: parseInt(m[2]) } : null
    }).filter(Boolean)
    if (!skus.length) continue

    let totalRsp = 0
    skus.forEach(({ sku, qty }) => {
      const rsp = rspMap[sku] || 0
      if (rsp > 0) totalRsp += rsp * qty
    })

    skus.forEach(({ sku, qty }) => {
      const rsp = rspMap[sku] || 0
      let allocated = 0
      if (totalRsp > 0 && rsp > 0) {
        allocated = order.revenue * ((rsp * qty) / totalRsp)
      }
      skuRows.push({
        date: order.date,
        channel: order.channel,
        sub_channel: order.sub_channel,
        order_id: order.order_id,
        parent_sku: sku,
        product_name: nameMap[sku] || sku,
        qty: qty,
        revenue_share: Math.round(allocated * 100) / 100,
        settled_date: order.settled_date,
        settled: order.settled ? 'True' : 'False',
      })
    })
  }

  if (!skuRows.length) return 0

  const orderIds = [...new Set(orders.map(o => o.order_id))]
  await DB.from('sku_revenue').delete().in('order_id', orderIds)

  const BATCH = 500
  for (let i = 0; i < skuRows.length; i += BATCH) {
    const { error } = await DB.from('sku_revenue').insert(skuRows.slice(i, i + BATCH))
    if (error) throw error
  }

  return skuRows.length  // ← return จำนวน rows สำหรับแสดงใน success state
}

function mergeSkus(skuList) {
  const merged = {}
  skuList.forEach(({ sku, qty }) => { merged[sku] = (merged[sku] || 0) + qty })
  return Object.entries(merged).sort(([a], [b]) => a.localeCompare(b)).map(([sku, qty]) => sku + 'x' + qty).join('+')
}

function tfFB(raw, m) {
  if (!raw) return ''
  const skus = raw.split(',').map(s => s.trim()).map(p => {
    const x = p.match(/^(.+?)\s*\((\d+)\)$/)
    return x ? { sku: norm(x[1], m), qty: parseInt(x[2]) } : null
  }).filter(Boolean)
  return mergeSkus(skus)
}

function tfTT(raw, m) {
  if (!raw) return ''
  const skus = []
  raw.split(',').map(s => s.trim()).forEach(g => {
    const mg = g.match(/^(.+?)\s*\((\d+)\)$/)
    if (!mg) return
    const mul = parseInt(mg[2])
    mg[1].split('+').map(s => s.trim()).forEach(it => {
      const mi = it.match(/^(.+?)x(\d+)$/i)
      if (!mi) return
      skus.push({ sku: norm(mi[1], m), qty: parseInt(mi[2]) * mul })
    })
  })
  return mergeSkus(skus)
}

function tfShopee(raw, m) {
  if (!raw) return ''
  const skus = raw.split('+').map(s => s.trim()).map(p => {
    const x = p.match(/^(.+?)x(\d+)$/i)
    if (x) return { sku: norm(x[1], m), qty: parseInt(x[2]) }
    // ไม่มี x → qty = 1 (Shopee บางออเดอร์ส่ง child SKU ตรงๆ)
    if (p) return { sku: norm(p, m), qty: 1 }
    return null
  }).filter(Boolean)
  return mergeSkus(skus)
}

function tfLazada(raw, m) {
  if (!raw) return ''
  const x = raw.trim().match(/^(.+?)x(\d+)$/i)
  const skus = x ? [{ sku: norm(x[1], m), qty: parseInt(x[2]) }] : [{ sku: norm(raw, m), qty: 1 }]
  return mergeSkus(skus)
}

function tfDealer(raw, m) { return raw ? norm(raw, m) : '' }
function tfGeneric(raw, m) { return raw ? norm(raw, m) : '' }

function goStep(n) {
  document.querySelectorAll('.step-panel').forEach((el, i) => el.classList.toggle('active', i + 1 === n))
  ;[1, 2, 3].forEach(i => {
    const num = document.getElementById('snum' + i)
    const lbl = document.getElementById('slabel' + i)
    num.classList.remove('active', 'done')
    lbl.classList.remove('active')
    if (i < n) { num.classList.add('done'); num.textContent = '✓' }
    else if (i === n) { num.classList.add('active'); num.textContent = i; lbl.classList.add('active') }
    else num.textContent = i
  })
  ;[1, 2].forEach(i => document.getElementById('sline' + i).classList.toggle('done', i < n))
  window.scrollTo(0, 0)
}

function showAlert(el, msg) { el.textContent = msg; el.style.display = 'block' }
</script>
</body>
