<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload | Deesay</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 32px 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; }
    .logout {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .logout:hover { border-color: #f1f5f9; color: #f1f5f9; }

    h2 { font-size: 1.3rem; margin-bottom: 24px; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      max-width: 860px;
    }

    .card-title {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    select, input[type="file"] {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      width: 100%;
    }
    select:focus { border-color: #6366f1; }

    .mapping-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 10px 16px;
      align-items: center;
    }
    .field-label {
      font-size: 0.9rem;
      color: #cbd5e1;
    }
    .field-required { color: #f87171; margin-left: 4px; }
    .match-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 8px;
    }
    .badge-auto { background: #14532d; color: #4ade80; }
    .badge-manual { background: #451a03; color: #fb923c; }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #334155; cursor: not-allowed; }
    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    .btn-secondary:hover { border-color: #6366f1; color: #f1f5f9; }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      overflow-x: auto;
      display: block;
    }
    .preview-table th {
      background: #0f172a;
      padding: 8px 12px;
      text-align: left;
      color: #94a3b8;
      font-weight: 500;
      white-space: nowrap;
    }
    .preview-table td {
      padding: 8px 12px;
      border-top: 1px solid #1e293b;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-table tr:hover td { background: #1e293b; }

    .summary-box {
      background: #0f172a;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .summary-box .num { color: #6366f1; font-weight: 700; }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .alert-error { background: #450a0a; border: 1px solid #991b1b; color: #fca5a5; }
    .alert-success { background: #052e16; border: 1px solid #166534; color: #4ade80; }

    .step { display: none; }
    .step.active { display: block; }

    .steps-indicator {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #334155;
    }
    .step-dot.active { background: #6366f1; }
    .step-dot.done { background: #4ade80; }

    .back-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover { color: #f1f5f9; }

    .progress-bar {
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">DEESAY</div>
  <div style="display:flex;gap:12px;align-items:center">
    <a href="index.html" class="back-link">← หน้าแรก</a>
    <button class="logout" onclick="logout()">ออกจากระบบ</button>
  </div>
</div>

<h2>📤 Upload ข้อมูลยอดขาย</h2>

<div class="steps-indicator">
  <div class="step-dot active" id="dot1"></div>
  <div class="step-dot" id="dot2"></div>
  <div class="step-dot" id="dot3"></div>
</div>

<!-- STEP 1: เลือก Channel + Upload ไฟล์ -->
<div class="step active" id="step1">
  <div class="card">
    <div class="card-title">Step 1 — เลือก Channel และไฟล์</div>

    <div style="margin-bottom:16px">
      <label style="font-size:0.85rem;color:#94a3b8;display:block;margin-bottom:6px">Channel</label>
      <select id="channelSelect">
        <option value="">-- เลือก Channel --</option>
        <option value="Facebook">Facebook</option>
        <option value="TikTok">TikTok</option>
        <option value="Shopee">Shopee</option>
        <option value="Lazada">Lazada</option>
        <option value="ตัวแทน">ตัวแทน</option>
        <option value="Modern Trade">Modern Trade</option>
      </select>
    </div>

    <div>
      <label style="font-size:0.85rem;color:#94a3b8;display:block;margin-bottom:6px">ไฟล์ Excel (.xlsx)</label>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    </div>

    <div id="step1Error" class="alert alert-error" style="display:none;margin-top:16px"></div>

    <div style="margin-top:20px">
      <button class="btn btn-primary" onclick="handleStep1()">ถัดไป →</button>
    </div>
  </div>
</div>

<!-- STEP 2: Column Mapping -->
<div class="step" id="step2">
  <div class="card">
    <div class="card-title">Step 2 — จับคู่คอลัมน์</div>
    <p style="font-size:0.85rem;color:#94a3b8;margin-bottom:20px">
      ระบบ auto-match คอลัมน์ให้แล้ว ตรวจสอบและแก้ไขถ้าไม่ถูกต้อง
    </p>

    <div class="mapping-grid" id="mappingGrid"></div>

    <div id="step2Error" class="alert alert-error" style="display:none;margin-top:16px"></div>

    <div style="margin-top:24px;display:flex;gap:12px">
      <button class="btn btn-secondary" onclick="goStep(1)">← ย้อนกลับ</button>
      <button class="btn btn-primary" onclick="handleStep2()">Preview →</button>
    </div>
  </div>
</div>

<!-- STEP 3: Preview + Confirm -->
<div class="step" id="step3">
  <div class="card">
    <div class="card-title">Step 3 — ตรวจสอบและยืนยัน</div>

    <div class="summary-box" id="summaryBox"></div>

    <div style="overflow-x:auto;margin-bottom:20px">
      <table class="preview-table" id="previewTable"></table>
    </div>

    <div id="step3Alert" style="display:none" class="alert"></div>

    <div class="progress-bar" id="progressBar" style="display:none">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div style="display:flex;gap:12px">
      <button class="btn btn-secondary" onclick="goStep(2)">← ย้อนกลับ</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="handleConfirm()">
        ✓ ยืนยัน Upload
      </button>
    </div>
  </div>
</div>

<script>
// ==========================================
// AUTH CHECK
// ==========================================
if (sessionStorage.getItem('auth') !== 'true') {
  window.location.href = 'login.html?redirect=upload.html'
}

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function logout() {
  sessionStorage.removeItem('auth')
  window.location.href = 'index.html'
}

// ==========================================
// FIELD DEFINITIONS
// ==========================================
const FIELDS = [
  { key: 'order_id',       label: 'Order ID',       required: true,
    keywords: ['เลขที่คำสั่งซื้อ','order id','orderid','order_id'] },
  { key: 'date',           label: 'วันที่',          required: true,
    keywords: ['วันที่สั่งซื้อ','วันที่','date','created'] },
  { key: 'sub_channel',    label: 'Sub Channel',     required: false,
    keywords: ['ชื่อช่องทางการขาย','sub_channel','channel','ช่องทาง'] },
  { key: 'customer_name',  label: 'ชื่อลูกค้า',      required: false,
    keywords: ['ลูกค้า','ชื่อ','customer','customer_name','ชื่อผู้รับ'] },
  { key: 'phone',          label: 'เบอร์โทร',        required: false,
    keywords: ['เบอร์โทร1','เบอร์โทร','phone','เบอร์ติดต่อ'] },
  { key: 'province',       label: 'จังหวัด',         required: false,
    keywords: ['จังหวัด','province','shippingcity'] },
  { key: 'district',       label: 'อำเภอ/เขต',       required: false,
    keywords: ['เขต/ อำเภอ','อำเภอ','เขต','district','shippingregion'] },
  { key: 'postcode',       label: 'รหัสไปรษณีย์',   required: false,
    keywords: ['รหัสไปรษณีย์','postcode','zipcode','shippingpostcode'] },
  { key: 'payment_method', label: 'วิธีชำระเงิน',   required: false,
    keywords: ['การชำระเงิน','payment','paymethod'] },
  { key: 'sku_promotion',  label: 'SKU (รหัสสินค้า)',required: true,
    keywords: ['รหัสสินค้า (sku) (จำนวน)','รหัสสินค้า','sku','sellersku','เลขอ้างอิง sku'] },
  { key: 'revenue',        label: 'ยอดรวม (Revenue)',required: true,
    keywords: ['รวมทั้งสิ้น','ยอดรวม','revenue','totalamount','total'] },
]

// SKU Transform per channel
const SKU_TRANSFORM = {
  'Facebook': transformFacebook,
  'TikTok':   transformTikTok,
  'Shopee':   transformShopee,
  'Lazada':   transformLazada,
  'ตัวแทน':  transformDealer,
  'Modern Trade': transformDealer,
}

// ==========================================
// STATE
// ==========================================
let rawHeaders = []
let rawData    = []
let mappings   = {}
let channel    = ''
let processed  = []

// ==========================================
// STEP 1
// ==========================================
async function handleStep1() {
  channel = document.getElementById('channelSelect').value
  const file = document.getElementById('fileInput').files[0]
  const errEl = document.getElementById('step1Error')

  if (!channel) return showError(errEl, 'กรุณาเลือก Channel ก่อน')
  if (!file)    return showError(errEl, 'กรุณาเลือกไฟล์')
  errEl.style.display = 'none'

  try {
    const data = await readExcel(file)
    rawHeaders = data.headers
    rawData    = data.rows
    buildMappingUI()
    goStep(2)
  } catch(e) {
    showError(errEl, 'อ่านไฟล์ไม่ได้: ' + e.message)
  }
}

// ==========================================
// STEP 2 — MAPPING UI
// ==========================================
function buildMappingUI() {
  const grid = document.getElementById('mappingGrid')
  grid.innerHTML = ''

  FIELDS.forEach(field => {
    const matched = autoMatch(field.keywords, rawHeaders)

    // Label
    const label = document.createElement('div')
    label.className = 'field-label'
    label.innerHTML = field.label +
      (field.required ? '<span class="field-required">*</span>' : '') +
      (matched
        ? '<span class="match-badge badge-auto">✓ auto</span>'
        : '<span class="match-badge badge-manual">เลือกเอง</span>')
    grid.appendChild(label)

    // Dropdown
    const sel = document.createElement('select')
    sel.id = 'map_' + field.key
    sel.innerHTML = '<option value="">-- ไม่ใช้ --</option>' +
      rawHeaders.map(h =>
        `<option value="${h}" ${h === matched ? 'selected' : ''}>${h}</option>`
      ).join('')
    grid.appendChild(sel)
  })
}

function autoMatch(keywords, headers) {
  for (const kw of keywords) {
    const found = headers.find(h => h.toLowerCase().trim() === kw.toLowerCase().trim())
    if (found) return found
    // partial match
    const partial = headers.find(h =>
      h.toLowerCase().includes(kw.toLowerCase()) ||
      kw.toLowerCase().includes(h.toLowerCase())
    )
    if (partial) return partial
  }
  return null
}

// ==========================================
// STEP 3 — PREVIEW
// ==========================================
async function handleStep2() {
  const errEl = document.getElementById('step2Error')

  // เก็บ mapping
  mappings = {}
  FIELDS.forEach(f => {
    const val = document.getElementById('map_' + f.key).value
    if (val) mappings[f.key] = val
  })

  // เช็ค required
  const missing = FIELDS.filter(f => f.required && !mappings[f.key])
  if (missing.length) {
    return showError(errEl, 'กรุณาเลือกคอลัมน์สำหรับ: ' + missing.map(f => f.label).join(', '))
  }
  errEl.style.display = 'none'

  // Process rows
  processed = await processRows(rawData, mappings, channel)

  // Summary
  const dupIds = new Set()
  const uniqueIds = new Set(processed.map(r => r.order_id))
  document.getElementById('summaryBox').innerHTML = `
    ไฟล์มีทั้งหมด <span class="num">${rawData.length}</span> แถว<br>
    จะ upsert เข้าระบบ <span class="num">${processed.length}</span> ออเดอร์<br>
    Channel: <span class="num">${channel}</span><br>
    Order ID ไม่ซ้ำ: <span class="num">${uniqueIds.size}</span> รายการ
  `

  // Preview table (5 แถวแรก)
  const headers = ['date','channel','sub_channel','order_id','customer_name',
                   'sku_promotion','revenue','province','payment_method']
  const table = document.getElementById('previewTable')
  table.innerHTML =
    '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>' +
    processed.slice(0,5).map(row =>
      '<tr>' + headers.map(h => `<td>${row[h] ?? ''}</td>`).join('') + '</tr>'
    ).join('')

  goStep(3)
}

// ==========================================
// CONFIRM UPLOAD
// ==========================================
async function handleConfirm() {
  const btn = document.getElementById('confirmBtn')
  const alertEl = document.getElementById('step3Alert')
  const progressBar = document.getElementById('progressBar')
  const progressFill = document.getElementById('progressFill')

  btn.disabled = true
  btn.textContent = 'กำลัง Upload...'
  progressBar.style.display = 'block'
  alertEl.style.display = 'none'

  try {
    const BATCH = 500
    let done = 0

    for (let i = 0; i < processed.length; i += BATCH) {
      const batch = processed.slice(i, i + BATCH)
      const { error } = await supabase
        .from('orders')
        .upsert(batch, { onConflict: 'order_id' })

      if (error) throw error
      done += batch.length
      progressFill.style.width = Math.round(done / processed.length * 100) + '%'
    }

    // Refresh views
    await supabase.rpc('refresh_all_views')

    alertEl.className = 'alert alert-success'
    alertEl.textContent = `✓ Upload สำเร็จ! ${processed.length} ออเดอร์เข้าระบบแล้ว`
    alertEl.style.display = 'block'
    btn.textContent = '✓ เสร็จแล้ว'

  } catch(e) {
    alertEl.className = 'alert alert-error'
    alertEl.textContent = 'เกิดข้อผิดพลาด: ' + e.message
    alertEl.style.display = 'block'
    btn.disabled = false
    btn.textContent = '✓ ยืนยัน Upload'
  }
}

// ==========================================
// READ EXCEL
// ==========================================
function readExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true })
        const ws = wb.Sheets[wb.SheetNames[0]]
        const json = XLSX.utils.sheet_to_json(ws, { defval: '' })
        if (!json.length) throw new Error('ไฟล์ว่างเปล่า')
        resolve({ headers: Object.keys(json[0]), rows: json })
      } catch(err) { reject(err) }
    }
    reader.onerror = () => reject(new Error('อ่านไฟล์ไม่ได้'))
    reader.readAsBinaryString(file)
  })
}

// ==========================================
// PROCESS ROWS
// ==========================================
async function processRows(rows, mappings, channel) {
  // โหลด products table สำหรับ SKU mapping
  const { data: products } = await supabase
    .from('products')
    .select('child_sku, parent_sku')
  const skuMap = {}
  if (products) products.forEach(p => skuMap[p.child_sku.toUpperCase()] = p.parent_sku.toUpperCase())

  // โหลด channels table
  const { data: channels } = await supabase
    .from('channels')
    .select('sub_channel, channel')
  const channelMap = {}
  if (channels) channels.forEach(c => channelMap[c.sub_channel] = c.channel)

  const transformFn = SKU_TRANSFORM[channel] || transformGeneric

  return rows.map(row => {
    const get = key => mappings[key] ? String(row[mappings[key]] ?? '').trim() : ''

    const rawSku     = get('sku_promotion')
    const subChannel = get('sub_channel')
    const rawDate    = get('date')

    return {
      order_id:       get('order_id'),
      date:           parseDate(rawDate),
      channel:        channelMap[subChannel] || channel,
      sub_channel:    subChannel || channel,
      sku_promotion:  transformFn(rawSku, skuMap),
      revenue:        parseFloat(get('revenue').replace(/,/g, '')) || 0,
      province:       get('province'),
      district:       get('district'),
      postcode:       get('postcode'),
      customer_name:  get('customer_name'),
      phone:          get('phone'),
      payment_method: get('payment_method'),
      settled:        channel === 'Facebook' ? true : false,
      settled_date:   channel === 'Facebook' ? parseDate(rawDate) : null,
    }
  }).filter(r => r.order_id)
}

// ==========================================
// SKU TRANSFORM FUNCTIONS
// ==========================================
function normalizeSku(sku, skuMap) {
  const clean = sku.toUpperCase().replace(/[-\.]/g, '').trim()
  return skuMap[clean] || clean
}

function transformFacebook(raw, skuMap) {
  // "ZOL02 (1), ZOL03 (1), FACEBR (1)" → "FACEBRx1+ZOL02x1+ZOL03x1"
  if (!raw) return ''
  const parts = raw.split(',').map(s => s.trim()).filter(Boolean)
  const skus = parts.map(part => {
    const m = part.match(/^(.+?)\s*\((\d+)\)$/)
    if (!m) return null
    const sku = normalizeSku(m[1], skuMap)
    const qty = parseInt(m[2])
    return { sku, qty }
  }).filter(Boolean)
  return skus.sort((a,b) => a.sku.localeCompare(b.sku))
             .map(s => `${s.sku}x${s.qty}`).join('+')
}

function transformTikTok(raw, skuMap) {
  // "LIPRPI01x2 (1), NIANSC02x1 (3)" → "LIPRx2+NIANSCx3"
  if (!raw) return ''
  const groups = raw.split(',').map(s => s.trim())
  const result = []
  groups.forEach(group => {
    const mGroup = group.match(/^(.+?)\s*\((\d+)\)$/)
    if (!mGroup) return
    const multiplier = parseInt(mGroup[2])
    const items = mGroup[1].split('+').map(s => s.trim())
    items.forEach(item => {
      const mItem = item.match(/^(.+?)x(\d+)$/i)
      if (!mItem) return
      const sku = normalizeSku(mItem[1], skuMap)
      const qty = parseInt(mItem[2]) * multiplier
      result.push({ sku, qty })
    })
  })
  return result.sort((a,b) => a.sku.localeCompare(b.sku))
               .map(s => `${s.sku}x${s.qty}`).join('+')
}

function transformShopee(raw, skuMap) {
  // raw = SKU field, qty อยู่ใน mappings แยก (จัดการใน processRows แล้ว)
  // "DSP01x1+DSP02x1" → parse ตามปกติ
  if (!raw) return ''
  const parts = raw.split('+').map(s => s.trim())
  const result = []
  parts.forEach(part => {
    const m = part.match(/^(.+?)x(\d+)$/i)
    if (!m) return
    const sku = normalizeSku(m[1], skuMap)
    const qty = parseInt(m[2])
    result.push({ sku, qty })
  })
  return result.sort((a,b) => a.sku.localeCompare(b.sku))
               .map(s => `${s.sku}x${s.qty}`).join('+')
}

function transformLazada(raw, skuMap) {
  // "DSP03x1" → "DSPx1"
  if (!raw) return ''
  const m = raw.trim().match(/^(.+?)x(\d+)$/i)
  if (!m) return normalizeSku(raw, skuMap)
  return normalizeSku(m[1], skuMap) + 'x' + m[2]
}

function transformDealer(raw, skuMap) {
  if (!raw) return ''
  return normalizeSku(raw, skuMap)
}

function transformGeneric(raw, skuMap) {
  return raw ? normalizeSku(raw, skuMap) : ''
}

// ==========================================
// HELPERS
// ==========================================
function parseDate(val) {
  if (!val) return null
  if (val instanceof Date) return val.toISOString().split('T')[0]
  const s = String(val).trim()
  // รูปแบบ "2026-06-01 9:57:17"
  const m = s.match(/^(\d{4}-\d{2}-\d{2})/)
  if (m) return m[1]
  // Excel serial number
  if (/^\d+$/.test(s)) {
    const d = new Date((parseInt(s) - 25569) * 86400 * 1000)
    return d.toISOString().split('T')[0]
  }
  return null
}

function goStep(n) {
  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === n)
  })
  document.querySelectorAll('.step-dot').forEach((el, i) => {
    el.classList.remove('active', 'done')
    if (i + 1 < n) el.classList.add('done')
    if (i + 1 === n) el.classList.add('active')
  })
  window.scrollTo(0, 0)
}

function showError(el, msg) {
  el.textContent = msg
  el.style.display = 'block'
}
</script>
</body>
</html>
